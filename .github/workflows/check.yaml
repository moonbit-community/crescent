name: check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Moon (nightly)
        uses: moonbit-community/setup-moonbit@main
        with:
          version: nightly

      - name: moon version
        run: moon version --all

      - name: install module dependencies
        run: moon update

      - name: moon check
        run: moon check --deny-warn --target native --warn-list=-ambiguous_braces-lexmatch_longest_match

      - name: moon build
        run: |
          moon build --target native
          moon build --target wasm

      - name: moon info
        run: |
          moon info --target native
          git diff --exit-code

      - name: format diff
        run: |
          moon fmt
          git diff --exit-code

      - name: Set ulimit
        run: ulimit -s 8176

      - name: moon test
        run: |
          moon test --target native
          moon test --target native

      - name: moon test (wasm)
        run: moon test --target wasm

      - name: install hurl
        env:
          HURL_VERSION: 8.0.1
        run: |
          curl --fail --show-error --location --output /tmp/hurl.deb \
            "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo apt-get install --yes /tmp/hurl.deb

      - name: hurl end-to-end tests
        run: |
          e2e/run.sh native
          e2e/run.sh wasm
